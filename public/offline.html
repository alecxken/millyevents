<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Offline — Milyvents</title>
<style>
body{font-family:'DM Sans',sans-serif;background:#f7f4ef;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;color:#1a2420}
h1{font-family:Georgia,serif;font-size:36px;font-weight:600;color:#07332c;margin-bottom:12px}
p{font-size:14px;color:#6b7c78;max-width:320px;line-height:1.7}
.dot{width:8px;height:8px;background:#bca879;border-radius:50%;display:inline-block;margin:0 3px}
</style></head>
<body>
<div>
  <div style="font-size:48px;margin-bottom:16px">📡</div>
  <h1>You're Offline</h1>
  <p>Milyvents needs a connection to load new events. Please check your network and try again.</p>
  <div style="margin-top:24px"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  <button onclick="location.reload()" style="margin-top:24px;padding:12px 28px;background:#07332c;color:#fff;border:none;border-radius:2px;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer">Try Again</button>
</div>
</body></html>
